body:
  text: 樵隱詞宋毛幵撰賀新郎風雨連朝夕最驚心春光晼晩又過寒食落盡一番新桃李芳草南園似積但燕子歸來幽寂况是單棲饒惆悵儘無聊有夢寒猶力春意逺恨虚擲東君自是人間客暫時來匆匆却去為誰留得走馬揷花當年事池畹空餘舊跡奈老去流光堪惜杳隔天涯人千里念無憑為寄長相憶回首處莫雲碧風流子新禽初弄舌東郊外催爾踏青期漸晴灩翠漪惠風駘蕩暖蒸紅霧淑景輝遲粉牆外杏花無限笑楊栁不勝垂閒裏嵗華但驚蕭索老來心賞尤惜芳菲平生歌酒地空回首惆悵觸緒沾衣誰見素琴翻恨青鏡留悲念千里雲遥莫天長短十年人杳流水東西惟有寄情芳草依舊萋萋薄倖栁橋南畔駐驄馬尋春幾遍自見了生塵羅襪爾許嬌波流眄為感郎松柏深心西陵已約平生願記别袖頻招斜門相送小立釵横鬢亂恨暗寫如蠶紙空目斷髙城人逺奈當時消息黄姑織女又成王謝堂前燕託琴心怨怕嬌雲弱雨東風驀地輕吹散傷春病也狼籍飛花滿院水龍吟登吳江橋作渺然震澤東來太湖望極平無際三吳風月一江煙浪古今絶致羽化蓬萊胸吞雲夢不妨如此看垂虹千丈斜陽萬頃盡倒影青奩裏追想扁舟去後對汀洲白蘋風起只今誰㑹水光山色依然西子安得超然相從物外此生終矣念素心空在徂年易失淚如鉛水瑞仙鶴柳風清晝溽山櫻晩一樹高紅爭熟輕紗睡初足悄無人欹枕虚檐鳴玉南園秉燭歎流光容易過目送春歸去有無數弄禽滿徑新竹閒記追歡尋勝杏棟西廂粉牆南曲别長㑹促成何計奈幽獨縱湘絃難寄韓香終在屏山蝶夢斷續對沿堦細草萋萋為誰自綠念奴嬌陪張子公登覽輝亭層欄飛棟壓孤城臨瞰并吞空闊千古吳京佳麗地一覽江山竒絶天際歸舟雲中煙樹鷺㸃汀洲雪三山無際𣺌然相望溟渤么鳯遺響悲涼故臺今不見蒼煙蕪沒千騎重來初起廢緬想六朝人物峴首他年羊公終在笑幾人磨滅一時樽爼且須同賦風月又少年竒志笑功名畫虎文章刻鵠永夜漫漫悲晝短難挽蒼龍銜燭飛藿飄零浮雲遷變過眼郵傳速昔人真意𣺌然千載誰屬猶喜二子當年諸公籍甚賞雲和孤竹翰墨流傳知幾許遺響宫商相續夢裏京華不須驚嘆春草年年綠赤霄歸去更看犇電歕玉又莫秋登石橋追和祝子權韻十年湖海歎潘郎憔悴無心雲閣强起登臨驚莫序目極清霜揺落散髪層阿振衣千仞浩蕩窮林壑泬寥無際鏡天收盡雲腳長嘯聲落悲風滄洲萬里想當年歸約回首區中無限事此意誰同商略欲駕飛鴻翩然獨往汗漫期相諾滯留何事坐令雙鬢如鶴又次韻施德初席上麗譙春晚望東南千里湖山佳色畫㦸門前清似水時節初過燈夕封井年登京華日近毎報平安驛滿城花栁正須千騎㝷覓憶我年少追遊叨兔園客右多慙英識今日懷人無限意老淚尊前重滴賦詠空傳雄豪誰在鬢㸃吳霜白招呼一醉幸公時慰愁寂又追和張巨山牡丹詞倚風含露似輕顰微笑盈盈脈脈染素匀紅知費盡多少東君心力國豔酣晴天香融煗畫手爭傳得綠窗朱戸曉粧誰見凝寂獨占三月芳菲千花百卉算難爭春色欲寄朝雲無限意回首京塵猶隔舞破霓裳一枝渾似醉倚香亭北舊懽如夢老懷􅄼更追惜又題曽氏溪堂王孫老去算無地傾倒胸中豪逸小築三間便席巻多少江山風月萬壑回流千峰輸秀人境成三絶登臨佳處鳥飛不盡空濶追念輞水斜川有風流千載淵明摩詰何必斯人聊一笑俯仰今猶前日只恐東州催成棠䕃又作三年别賞心難繼莫敎辜負華髪又記夢阿環家住閬風頂絳門瑶臺相接翳鳯椉鸞人不見隱隱霓裳雲衱秀骨貞風長眉翠淺映白咽紅頰非煙深處𣺌然雲浪千疊一笑徐福扁舟春風空老盡當時童妾骨冷魂清驚夢到同看碧桃千葉寄語青童何時丹就為我留瓊笈天鷄催曉却愁吹墮塵刼又中秋夕素秋新霽風露洗寥廓珠宫瓊闕簾幙生寒人未定鵲羽驚飛林樾河漢無聲微雲收盡相映寒光發三千銀界一時無此奇絶正是老子南樓多情辜負了十分佳節起舞徘徊誰為我傾倒盃中明月欲攬姮娥扁舟滄海戯濯凌波襪漏殘鐘斷坐愁人世超忽燕山亭勔侄求睡紅亭為賦㬉靄輝遲雨過夜來簾外春風徐轉霞散錦舒密映㣲窺亭亭萬枝開遍一笑嫣然猶記有畫圖曾見無伴初睡起昭陽弄粧日晚長是相趂佳期有尋舊流鸎貪新雙燕惆悵共誰細繞花隂空懷紫簫淒怨銀燭光中且更待夜深重看留戀愁酒醒緋桃千片水調歌頭次韻陸務觀陪太守方務德登多景樓襟帶大江左平望見三州鑿空遺跡千古竒勝米公樓太守中朝耆舊别駕當今豪逸人物藐應劉此地一尊酒歌吹擁貔貅楚山曉淮月夜海門秋登臨無盡須信詩眼不供愁恨我相望千里空想一時髙唱零落幾人收妙賞頻回首誰復繼風流又上元羣集春意滿南國花動雪明樓千坊萬井此時燈火隘追遊十里寒星相照一輪明月斜掛縹緲映紅毬共嬉不禁夜光彩遍飛浮豔神仙轟鼓吹引鰲頭文章太守此時賓從敵應劉回首昇平舊事未減當年風月一醉為君酬明日朝天去空復想風流又和人新堂小築百年計雅志幾人成亂山深處煙雨面面對縈青巾屨方安吾土花木仍供真賞隣有阮􅄞生歳月抛身外塵事更無營鳥知歸雲出岫兩忘情從渠華屋回首煙草弔頽傾何似生涯纔足欹枕南窗北牖醉夢落樵聲更喜濯纓處門外一江清又送周元特漢代李元禮江左管夷吾英姿雅望澟澟玉立冠中都礧磈胸中千丈不肻低回青禁引去卧江湖更學鴟夷子一舸下東吳送公别盃酒盡少躊躇舊棠隂下幾人臨路擁行車歸近雲天尺五夢想經綸賢業談笑取單于為問苕溪水留得此翁無又次劉若訥韻十載劉夫子名過庾蘭成人人爭看角犀今喜試豐盈傾耳新詩千首妙處端須擊節金石破蟲聲此士難復得黄口閙如羮憶年少游俠窟戲荆卿結交投分馳心千里劇搖旌我老公方豪健儻許相從晩嵗忼慨激中情洗眼功名㑹一箭取遼城滿庭芳自宛陵易倅東陽留别諸同寮世事難窮人生無定偶然蓬轉萍浮為誰敎我從宦到東州還似翩翩海燕椉春至歸及涼秋回頭笑渾家數口又泛五湖舟悠悠當此去黄童白叟莫漫相留但谿山好處深負重游珍重諸公送我臨岐涙欲語先流應須記從今風月相憶在南樓又五十年來追思疇昔佳時去若雲浮依然重見感涕話西州幸喜靈光不改空自笑蒲栁先秋成何事風波末路險畏有沉舟别愁都幾許相從未斁我去公留況平生狂直誰念遨遊月夕風天正好還驚悵失此詩流江南㟁明朝更逺回首仲宣樓又行次四安用前韻寄章叔通沈無㥯濩落難容崎嶇堪笑一年陸走川浮又攜妻子兩度過神州紫蟹鱸魚正美涼天氣恰傍中秋今宵意無人伴我快瀉玉雙舟功名聊爾耳千金聘楚萬戸封留又爭如物外閒曠優游好在東阡北陌相從有諸老風流家山近歸休去也不上望京樓滿江紅送施德初東馬嚴徐名籍甚西京人物誰不羡伏蒲忠鯁演綸詞筆雅意中朝今小試二年東郡弦風跡數中興循吏兩三人公居一溫詔趣還丹闕傾睿想方前席看雲臺登踐論思密勿超覽堂中遺愛在幾人同戀津亭别顧倦游雲路僕登仙心如失又懷家山作回首吾廬思歸去石谿樵谷臨翫有門前流水亂松疎竹幽草春餘荒井逕鳴禽自在窺牆屋但等閒凭几看南山雲相逐家釀美招隣曲朝飯飽隨耕牧況東臯二頃嵗時都足麟閣功名身外事牆隂不駐流光促更休論一枕夢中驚黄梁熟又潑火初收鞦韆外輕煙漠漠春漸逺綠楊芳草燕飛池閣已著單衣寒食後夜來還是東風惡對空山寂寂杜鵑啼梨花落傷别恨閒情作十載事驚如昨向花前月下共誰行樂飛葢低迷南苑路湔裙悵望東城約但老來顦顇惜春心年年覺江城子和德初燈夕詞次葉石林韻神仙樓觀梵王宫月當中望難窮坐聽三通譙鼓報籠銅還憶當年京輦舊車馬㑹五門東華堂歌舞間笙鐘夕香濛度花風翠袖傳盃爭勸紫髯翁歸去不堪春夢斷煙雨曉亂山重又倚牆高樹落驚禽小窗深夜沉沉酒醒燈昏人靜更愁霖惆悵行雲留不住攜手處却分襟悠悠風月兩闗心擁孤衾恨難禁何況一春顦顇到如今最苦清宵無寐極相見夢也難尋漁家傲極目丹楓迎霽曉山明水淨新霜早燕去鴻歸無事了天𣺌𣺌風吹平野低寒草漸過初冬時節好尋梅踏雪城南道追憶舊遊人已老懽更少孤懷擬共誰傾倒又次丹陽憶故人楊子津頭風色莫孤舟𣺌𣺌江南去憶得佳人臨别處愁返顧青山幾㸃斜陽樹可忍歸期無定㨿天涯已聽邊鴻度昨夜鄉心留不住無驛數夢中行了來時路蝶戀花羅襪匆匆曾一過烏鵲歸來怨感流年度别袖空看啼粉涴相思待倩誰分付殘雪江村迴馬路嫋嫋春寒簾晚空凝佇人在梅花深處住梅花落盡愁無數醉落魄梅莫寒淒冽春風探繞南枝發更無人處增清絶冷蕋孤香竹外朦朧月西洲昨夢憑誰説攀翻􅓑憶經年别新愁悵望催華髮雀啅江頭一樹垂垂雪玉樓春日長澹澹光風轉小尾黄蜂隨早燕行尋香逕不逢人惟有落紅千萬片酒成顦顇花成怨閒殺羽觴難㑹面可堪春事已無多新笋遮牆苔滿院又來如春夢幾多時去似朝雲無覓處是歐陽永叔現成對子平仲向稱詞家能品亦肯襲人耶曲房小院匆匆過急鼓疎鐘催又去來如春夢幾多時去似朝雲無覔處金瓶落井翻相誤可惜馨香隨手故錦囊空有斷腸書彩筆不傳長恨句浪淘沙簾幙燕雙飛春共人歸東風惻惻雨霏霏水滿西池花滿地追惜芳菲回首昔遊非别夢依稀一成春痩不勝衣無限樓前傷逺意芳草斜暉眼兒媚小溪微月淡無痕殘雪擁孤村攀條弄蕋春愁相值寂黙無言忍寒竚立何人見應怯過黄昏朝陽夢斷熏殘沉水誰為招魂秋蕋香蕩㬉花風滿路織翠栁隂和霧曲池鬬草舊遊處憶試春衫白苧暗驚節意朱絃柱送春去曉來一陣埽花雨惆悵薔薇在否畫堂春華燈取盡雪初殘踏青還爾遊盤落梅强半已飛翻剗地春寒多病故人日遠幾時雙燕來還可憐樓上一凭欄不見長安應天長令曲欄十二閒亭沼履迹雙沉人悄悄被池寒香燼小夢短女牆鸎喚曉栁枝風輕嫋嫋門外落花多少日日離愁縈繞不知春過了好事近次韻葉夢楊陳天予南園作飛蓋滿南園想見八仙遥集幾樹海棠開徧正新晴天色休辭一醉任無還衣上酒痕濕便恐嵗華催去聽秋蟲相泣謁金門春已半芳草池塘綠徧山北山南花爛漫日長蜂蝶亂閒掩屏山六扇夢好强敎驚斷愁對畫梁雙語燕故心人不見又傷離索猶記並肩池閣病起綠牕閑倚薄一秋天氣惡玉臂都寛金約歌舞新來忘却回首故人天一角半江楓又落㸃絳唇夜色侵霜蕭蕭絡緯啼金井夢寒初警一倍銅壺永無限思量展轉愁重省熏爐冷起來人靜窗外梧桐影樵隱詞樵隱詞跋平仲三衢人仕止州倅禮部尚書友之子負才玩世頗有毛伯成之風撰樵隠集十五巻尤延之為序惜乎不傳揚用修云毛幵小詞一巻惟余家有之極賞其潑火初収一闋今一不多見余近得楊夢羽先生秘蔵宋元名家詞抄本二十七種内有樵隠詩餘一巻共四十二首調名二十有三亟梓而行之庶不與集俱湮耳湖南毛晉識
